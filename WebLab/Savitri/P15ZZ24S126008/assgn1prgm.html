<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>Simple Calculator</title> 
 
<style> 
* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
} 
 
body { 
  font-family: Arial, sans-serif; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  height: 100vh; 
  background-color: #efefed; /* soft pastel cream background */ 
} 
 
.calculator { 
  background-color: #fff5f8; /* pastel pinkish-white */ 
  padding: 20px; 
  border-radius: 10px; 
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
  text-align: center; 
} 
 
#display { 
  width: 100%; 
  height: 80px; 
 
  font-size: 2rem; 
  text-align: right; 
  margin-bottom: 20px; 
  padding: 10px; 
  border: 2px solid #a0e7e5; /* pastel teal border */ 
  border-radius: 10px; 
  background-color: #fffafc; /* very light pastel background */ 
} 
 
.buttons { 
  display: grid; 
  grid-template-columns: repeat(4, 1fr); 
  gap: 10px; 
} 
 
button { 
  padding: 20px; 
  font-size: 1.5rem; 
  border: none; 
  border-radius: 50px; 
  cursor: pointer; 
  transition: background-color 0.2s; 
  background-color: #eab5e2; /* pastel mint */ 
} 
 
button:hover { 
  background-color: #acffc8; /* pastel yellow on hover */ 
} 
 
/* Updated colors for C and delete buttons */ 
.clear { 
  background: #d3aaf7; /* soft purple */ 
} 
 
.clear:hover { 
  background-color: #c3aaff; /* slightly darker purple on hover */ 
} 
 
 
 
 
.del { 
  background: #ffc6a0; /* soft blue */ 
} 
 
.del:hover { 
  background-color: #8fbfff; /* slightly darker blue on hover */ 
} 
 
.equal { 
  background: #fbffbf; /* pastel green */ 
  grid-column: span 1; 
} 
 
.zero { 
  grid-column: span 1; 
} 
 
</style> 
 
<script> 
function appendToDisplay(value) { 
  document.getElementById("display").value += value; 
} 
 
function clearDisplay() { 
  document.getElementById("display").value = ""; 
} 
 
function deleteLast() { 
  const display = document.getElementById("display"); 
  display.value = display.value.slice(0, -1); 
} 
 
function calculateResult() { 
  const display = document.getElementById("display"); 
  
 
 
 
 
 
try { 
display.value = eval(display.value); 
} catch (e) { 
display.value = "Error"; 
} 
} 
</script> 
</head> 
<body> 
<div class="calculator"> 
<h1 style="text-align:center">Simple Calculator</h1> 
<input type="text" id="display" disabled> 
<div class="buttons"> 
<button onclick="appendToDisplay('(')">(</button> 
<button onclick="appendToDisplay(')')">)</button> 
<button class="clear" onclick="clearDisplay()">C</button> 
<button class="del" onclick="deleteLast()">⌫</button> 
<button onclick="appendToDisplay('7')">7</button> 
<button onclick="appendToDisplay('8')">8</button> 
<button onclick="appendToDisplay('9')">9</button> 
<button onclick="appendToDisplay('/')">/</button> 
<button class="zero" onclick="appendToDisplay('0')">0</button> 
<button onclick="appendToDisplay('.')">.</button> 
<button onclick="appendToDisplay('4')">4</button> 
<button onclick="appendToDisplay('5')">5</button> 
<button onclick="appendToDisplay('6')">6</button> 
<button onclick="appendToDisplay('*')">*</button> 
<button onclick="appendToDisplay('1')">1</button> 
<button onclick="appendToDisplay('2')">2</button> 
<button onclick="appendToDisplay('3')">3</button> 
<button onclick="appendToDisplay('-')">-</button> 
<button class="equal" onclick="calculateResult()">=</button> 
  <button onclick="appendToDisplay('+')">+</button> 
</div> 
</div> 
</body> 
</html>
