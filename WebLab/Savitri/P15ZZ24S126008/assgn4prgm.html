<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>AI Websites Grid</title>
 <style>
 body {
 margin: 0;
 padding: 20px;
 font-family: Arial, sans-serif;
 background: #f0f2f5;
 background-color:rgb(240, 195, 246);
 }
 h1 {
 text-align: center;
 margin-bottom: 20px;
 }
 .grid-container {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
 gap: 20px;
 }
.frame-box {
 background: white;
 border-radius: 8px;
 overflow: hidden;
 box-shadow: 0 4px 10px rgba(0,0,0,0.1);
 }

iframe {
 width: 80%;
 height: 100px;
 border: none;
 }
 .title {
 padding: 10px;
 background: #0078ff;
 color: white;
 font-weight: bold;
 }
 </style>
</head>
<body>
 <h1>Universities in India</h1>
 <div class="grid-container">
 <div class="grid-item">
 <iframe class="frame" src="https://www.cuk.ac.in/"></iframe>
 <p>Central university of Karnataka</p>
 </div>
 <div class="grid-item">
 <iframe class="frame" src="https://www.unipune.ac.in"></iframe>
 <p>Savitribai Phule Pune University</p>
 </div>
 <div class="grid-item">
 <iframe class="frame" src="https://www.amu.ac.in/" ></iframe>
<p>Aligarh muslim university</p>
 </div>
 <div class="grid-item">
 <iframe class="frame" src="https://www.du.ac.in/" ></iframe>
<p>University of Delhi</p>
 </div>
 <div class="grid-item">
 <iframe class="frame" src="https://bbau.ac.in" frameborder="0"></iframe>
<p>Babasaheb Bhimrao Ambedkar Universty</p>
</div>
</body>
</html>
