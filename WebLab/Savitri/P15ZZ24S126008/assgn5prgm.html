<!DOCTYPE html> 
<html> 
<head> 
  <meta charset="UTF-8"> 
  <title>Canvas Shapes Example</title> 
  <style> 
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      margin-top: 20px; 
      background: linear-gradient(135deg, #e9b2e9, #73ecd8); 
    } 
    canvas { 
      border: 1px solid black; 
      background-color: #ffffff; 
    } 
  </style> 
</head> 
<body> 
 
<h2>Canvas Drawing: Triangle, Rectangle, Circle, Line</h2> 
 
<canvas id="myCanvas" width="400" height="300"></canvas> 
 
<script> 
  const canvas = document.getElementById("myCanvas"); 
  const ctx = canvas.getContext("2d"); 
 
  // --- Rectangle --- 
  ctx.fillStyle ="#FF0000"; // Dark Purple
  ctx.fillRect(30, 30, 140, 90); 
 
  
 
 
 
 // --- Circle --- 
  ctx.beginPath(); 
  ctx.arc(300, 90, 50, 0, Math.PI * 2); 
  ctx.fillStyle = "#008000"; // Crimson Red
  ctx.fill(); 
 
  // --- Triangle --- 
  ctx.beginPath(); 
  ctx.moveTo(80, 150); 
  ctx.lineTo(40, 250); 
  ctx.lineTo(140, 250); 
  ctx.closePath(); 
  ctx.fillStyle = "#FFFF00"; // Teal Green   
  ctx.fill(); 
 
  // --- Straight Line --- 
  ctx.beginPath(); 
  ctx.moveTo(220, 200); 
  ctx.lineTo(360, 260); 
  ctx.lineWidth = 4; 
  ctx.strokeStyle = "#A52A2A"; // Deep Sky Blue
  ctx.stroke(); 
</script> 
 
</body> 
</html>
