<!DOCTYPE html>
<html>
<head>
  <title>Product Table Example</title>
  <style>
    table {
      width: 70%;
      border-collapse: collapse;
      margin: 20px auto;
      font-family: Arial, sans-serif;
    }
    th, td {
      border: 1px solid #333;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #4CAF50;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    tr:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Product List</h2>
  <table>
    <tr>
      <th>Product Name</th>
      <th>Category</th>
      <th>Price</th>
      <th>Availability</th>
    </tr>
    <tr>
      <td>Laptop Pro 15</td>
      <td>Electronics</td>
      <td>$1,299</td>
      <td>In Stock</td>
    </tr>
    <tr>
      <td>Wireless Earbuds</td>
      <td>Accessories</td>
      <td>$149</td>
      <td>Limited</td>
    </tr>
    <tr>
      <td>Smartwatch X</td>
      <td>Wearables</td>
      <td>$299</td>
      <td>In Stock</td>
    </tr>
    <tr>
      <td>Office Chair Elite</td>
      <td>Furniture</td>
      <td>$199</td>
      <td>Out of Stock</td>
    </tr>
    <tr>
      <td>Coffee Maker 500</td>
      <td>Appliances</td>
      <td>$89</td>
      <td>In Stock</td>
    </tr>
  </table>
</body>
</html>
