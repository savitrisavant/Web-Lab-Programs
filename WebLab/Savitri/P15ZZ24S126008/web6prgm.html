<!DOCTYPE html>  
<html>  
<head>  
    <title>Greeting Alert Example</title>  
    <script>  
        function showGreeting() {  
            alert("Hello! Welcome to my webpage");  
        }  
    </script>  
</head>  
  
<body style="text-align:center; margin-top:100px; font-family:'Times New Roman', 
serif;background-color: rgb(203, 255, 196);">  
  
    <h2>Click the Button to See Alert message</h2>  
  
    <!-- Button that calls JavaScript function -->  
    <button onclick="showGreeting()"   
            style="padding:10px 1cqb; font-size:16px; cursor:pointer; background-color:#fa73dd; color:white;">  
        Click Here  
    </button>  
</body>  
</html>
