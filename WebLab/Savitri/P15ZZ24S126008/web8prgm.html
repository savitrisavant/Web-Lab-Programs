<!DOCTYPE html>
<html>
<head>
<title>Even or Odd Checker</title>
<script>
function checkNumber() {
  num = prompt("Enter a number:");
  // Convert entered value to a number
  num = Number(num);
  // Check if input is a valid number
  if (isNaN(num)) {
    alert("Please enter a valid number!");
  } else {
    // Check if number is even or odd
    if (num % 2 === 0) {
      alert(num + " is an EVEN number.");
    } else {
      alert(num + " is an ODD number.");
    }
  }
}
</script>
</head>
<body style="text-align:center; margin-top:30px;background-color: rgb(255, 253, 225);">
<h2>Check if a Number is Even or Odd</h2>
<button onclick="checkNumber()" style="padding:10px 20px; font-size:16px; background: linear-gradient(45deg, #ff7d60, #1706b3); cursor: default; color: white;">Click to Enter Number</button>
</body>
</html>
